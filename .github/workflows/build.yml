name: Build & Publish Add-on

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        arch: [aarch64, amd64, armhf, armv7, i386]
        include:
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.19
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.19
          - arch: armhf
            platform: linux/arm/v6
            base: ghcr.io/home-assistant/armhf-base-python:3.12-alpine3.19
          - arch: armv7
            platform: linux/arm/v7
            base: ghcr.io/home-assistant/armv7-base-python:3.12-alpine3.19
          - arch: i386
            platform: linux/386
            base: ghcr.io/home-assistant/i386-base-python:3.12-alpine3.19

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/chore-tracker-addon/${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./chore-tracker
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_FROM=${{ matrix.base }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
